name: AI Code Review (Claude via LiteLLM)

# pull_request_target runs in the BASE repo context — has access to secrets
# even when PR comes from an external fork. We only read the diff (never execute
# fork code), so this is safe.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  claude-review:
    name: "Step 1 — Claude reviews the PR"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }})
          # Store in file to avoid env var size limits
          echo "$DIFF" > /tmp/pr_diff.txt
          echo "lines=$(wc -l < /tmp/pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Claude — Code Review
        id: review
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          LITELLM_MODEL: ${{ secrets.LITELLM_MODEL }}
        run: |
          DIFF=$(cat /tmp/pr_diff.txt)
          PAYLOAD=$(jq -n \
            --arg model "${LITELLM_MODEL:-gemini-pro}" \
            --arg diff "$DIFF" \
            '{
              model: $model,
              messages: [{
                role: "user",
                content: ("You are a senior engineer doing a code review. Review this PR diff carefully.\n\nEvaluate:\n1. Correctness — any bugs or logic errors?\n2. Edge cases — what inputs could break this?\n3. Code quality — naming, structure, readability\n4. Test coverage — are the tests adequate?\n\nEnd with exactly one of:\n✅ LGTM — safe to merge\n⚠️ MINOR ISSUES — can merge, but note these\n❌ CHANGES REQUIRED — must fix before merge\n\nBe direct and specific. Under 350 words.\n\nDIFF:\n" + $diff)
              }],
              max_tokens: 1024
            }')
          RESPONSE=$(curl -s -X POST "${LITELLM_BASE_URL}chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LITELLM_API_KEY" \
            -d "$PAYLOAD")
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Review unavailable."')
          echo "$REVIEW" > /tmp/review.txt
          echo "done=true" >> $GITHUB_OUTPUT

      - name: Claude — Security Scan
        id: security
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          LITELLM_MODEL: ${{ secrets.LITELLM_MODEL }}
        run: |
          DIFF=$(cat /tmp/pr_diff.txt)
          PAYLOAD=$(jq -n \
            --arg model "${LITELLM_MODEL:-gemini-pro}" \
            --arg diff "$DIFF" \
            '{
              model: $model,
              messages: [{
                role: "user",
                content: ("Security scan only. Check for: SQL injection, hardcoded secrets, unsafe inputs, dangerous functions, dependency issues.\n\nIf clean: \"🔒 No security issues found.\"\nIf issues found: list each with severity LOW/MEDIUM/HIGH and exact line.\nUnder 150 words.\n\nDIFF:\n" + $diff)
              }],
              max_tokens: 512
            }')
          RESPONSE=$(curl -s -X POST "${LITELLM_BASE_URL}chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LITELLM_API_KEY" \
            -d "$PAYLOAD")
          SECURITY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Scan unavailable."')
          echo "$SECURITY" > /tmp/security.txt

      - name: Post full review as PR comment
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          REVIEW=$(cat /tmp/review.txt)
          SECURITY=$(cat /tmp/security.txt)
          AUTHOR="${{ github.event.pull_request.user.login }}"
          FORK="${{ github.event.pull_request.head.repo.full_name }}"

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "## 🤖 AI Code Review

          **PR from:** \`${FORK}\` → \`main\`
          **Author:** @${AUTHOR}

          ---

          ### 📋 Code Review
          ${REVIEW}

          ---

          ### 🔒 Security Scan
          ${SECURITY}

          ---

          > **Next step:** An authorized stakeholder must click **Approve** on this PR.
          > The AI bot will then execute the merge automatically.
          > No human can push directly to \`main\`."
