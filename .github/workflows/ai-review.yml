name: AI Code Review (Claude Code)

# pull_request_target runs in the context of the BASE repo (main), not the fork.
# This means it has access to secrets even when the PR comes from an external fork.
# We only read the diff — we never execute fork code — so this is safe.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  claude-review:
    name: "Claude Code — Step 1: Review"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout base repo (safe — not the fork code)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff from fork
        id: diff
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} 2>/dev/null)
          echo "DIFF<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Claude Code — Code Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          REVIEW=$(claude --print << 'PROMPT'
          You are a senior engineer doing a code review. Review the PR diff below.

          Evaluate:
          1. Correctness — any bugs or logic errors?
          2. Edge cases — what inputs could break this?
          3. Code quality — naming, structure, readability
          4. Test coverage — are the tests adequate?

          End with one of:
          ✅ LGTM — safe to merge
          ⚠️  MINOR ISSUES — can merge, but note these
          ❌ CHANGES REQUIRED — must fix before merge

          Keep it under 350 words. Be direct.

          DIFF:
          ${{ steps.diff.outputs.DIFF }}
          PROMPT
          )
          echo "REVIEW<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Claude Code — Security Scan
        id: security
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SECURITY=$(claude --print << 'PROMPT'
          You are a security reviewer. Scan this diff for security issues only.
          Check for: injection vulnerabilities, hardcoded secrets, unsafe inputs,
          dangerous function calls, dependency risks.

          If clean: "🔒 Security: No issues found."
          If issues: list each with severity (LOW/MEDIUM/HIGH) and the exact line.

          Keep it under 150 words.

          DIFF:
          ${{ steps.diff.outputs.DIFF }}
          PROMPT
          )
          echo "SECURITY<<EOF" >> $GITHUB_OUTPUT
          echo "$SECURITY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Claude's review as PR comment
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          FORK="${{ github.event.pull_request.head.repo.full_name }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "## 🤖 Claude Code Review

          **PR from fork:** \`${FORK}\` → \`main\`
          **Author:** @${AUTHOR}

          ---

          ### Code Review
          ${{ steps.review.outputs.REVIEW }}

          ---

          ### Security Scan
          ${{ steps.security.outputs.SECURITY }}

          ---

          > An authorized stakeholder must **Approve** this PR to proceed.
          > Claude Code bot will handle the merge — no human can push to \`main\` directly."
