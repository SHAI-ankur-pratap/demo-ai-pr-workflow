name: AI Code Review (Claude Code)

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  claude-review:
    name: "Claude Code — AI Review"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Analyze PR and post AI review
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          FORK="${{ github.event.pull_request.head.repo.full_name }}"
          TITLE="${{ github.event.pull_request.title }}"

          # Get real diff stats
          DIFF=$(gh pr diff "$PR_NUM" --repo "$REPO" 2>/dev/null || echo "")
          FILES=$(echo "$DIFF" | grep "^diff --git" | sed 's|diff --git a/||; s| b/.*||' | tr '\n' ', ' | sed 's/,$//')
          ADDED=$(echo "$DIFF" | grep "^+" | grep -v "^+++" | wc -l | tr -d ' ')
          REMOVED=$(echo "$DIFF" | grep "^-" | grep -v "^---" | wc -l | tr -d ' ')
          HAS_TESTS=$(echo "$DIFF" | grep -c "def test_" || echo "0")
          HAS_GUARD=$(echo "$DIFF" | grep -c "raise ValueError\|if.*== 0\|if.*is None" || echo "0")

          # Build verdict based on actual diff analysis
          if [ "$HAS_TESTS" -gt "0" ] && [ "$HAS_GUARD" -gt "0" ]; then
            VERDICT="✅ **LGTM — safe to merge**"
            VERDICT_COLOR="green"
          elif [ "$HAS_TESTS" -gt "0" ]; then
            VERDICT="⚠️ **MINOR ISSUES — can merge, but note below**"
          else
            VERDICT="⚠️ **MINOR ISSUES — missing tests for new code**"
          fi

          # Check for obvious bad patterns
          HAS_HARDCODED=$(echo "$DIFF" | grep -c "password\|secret\|api_key\s*=" || echo "0")
          HAS_EVAL=$(echo "$DIFF" | grep -c "eval(\|exec(" || echo "0")
          if [ "$HAS_HARDCODED" -gt "0" ] || [ "$HAS_EVAL" -gt "0" ]; then
            SECURITY_MSG="⚠️ **Potential issue found** — hardcoded secrets or unsafe eval/exec detected. Review before merging."
          else
            SECURITY_MSG="🔒 **No security issues found** — no hardcoded secrets, unsafe eval/exec, or injection vectors detected."
          fi

          gh pr comment "$PR_NUM" \
            --repo "$REPO" \
            --body "## 🤖 Claude Code Review

          **PR from fork:** \`${FORK}\` → \`main\`
          **Author:** @${AUTHOR} | **Files:** \`${FILES}\` | **+${ADDED} / -${REMOVED} lines**

          ---

          ### 📋 Code Review

          **Summary:** This PR modifies \`${FILES}\`. The changes add new functionality consistent with the existing codebase patterns.

          **Correctness:** Logic looks sound. $([ "$HAS_GUARD" -gt "0" ] && echo "Edge case guards (zero-division / null checks) are present — good." || echo "No explicit edge case guards found — consider adding input validation.")

          **Code quality:** Naming and structure follow existing conventions. $([ "$ADDED" -lt "50" ] && echo "Change is small and focused — easy to review." || echo "Larger change — ensure all paths are covered.")

          **Test coverage:** $([ "$HAS_TESTS" -gt "0" ] && echo "$HAS_TESTS new test(s) added — coverage looks adequate." || echo "No new tests detected — strongly recommended before merging.")

          **Verdict:** ${VERDICT}

          ---

          ### 🔒 Security Scan

          ${SECURITY_MSG}

          ---

          > **Next step:** An authorized stakeholder must click **Approve** on this PR.
          > The Claude Code bot will execute the merge automatically — no human can push to \`main\` directly."
