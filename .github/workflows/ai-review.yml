name: AI Code Review (Claude Code)

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  claude-review:
    name: Claude Code Reviews PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          npm install -g @anthropic-ai/claude-code
          pip install pytest

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} 2>/dev/null || git diff origin/main...HEAD)
          echo "DIFF<<EODIFF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EODIFF" >> $GITHUB_OUTPUT

      - name: Run tests
        id: tests
        run: |
          TEST_RESULT=$(python -m pytest tests/ -v 2>&1 || true)
          echo "RESULT<<EORESULT" >> $GITHUB_OUTPUT
          echo "$TEST_RESULT" >> $GITHUB_OUTPUT
          echo "EORESULT" >> $GITHUB_OUTPUT

      - name: Claude Code reviews the PR
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          REVIEW=$(cat << 'PROMPT_EOF' | claude --print
          You are a senior code reviewer. Review the following pull request diff.

          Your review must:
          1. Summarize what the PR changes (1-2 sentences)
          2. Identify any bugs, edge cases, or issues
          3. Check for code quality and best practices
          4. Give a final verdict: LGTM (looks good to merge) or CHANGES REQUESTED

          Keep your review under 400 words. Be direct and specific.

          DIFF:
          ${{ steps.diff.outputs.DIFF }}

          TEST RESULTS:
          ${{ steps.tests.outputs.RESULT }}
          PROMPT_EOF
          )
          echo "REVIEW<<EOREVIEW" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOREVIEW" >> $GITHUB_OUTPUT

      - name: Post review as PR comment
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          COMMENT="## 🤖 Claude Code Review

          ${{ steps.review.outputs.REVIEW }}

          ---
          *Reviewed by Claude Code. A stakeholder must approve this PR before it can be merged.*
          *Only the AI bot can execute the merge — direct pushes to \`main\` are blocked.*"

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"
